# CI berlapis: unit backend + sintaks compileall + ESLint/tipe + Next build produksi.
# Ini bukti «all code hooks together» sampai tingkat artefakt produksi, tanpa E2E browser.
name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pengatur Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-verify.txt

      - name: Backend unit test + pemeriksa sintaks
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-verify.txt
          python -m pytest -q
          python -m compileall -q app

      - name: Pengatur Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend lint types build
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run type-check
          npm run build
