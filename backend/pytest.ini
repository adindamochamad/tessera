[pytest]
# Hanya kumpulkan tes dari folder ini (hindari menganggap paket app sebagai modul tes).
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Cakupan wajib modul analyzers (target hackathon Day 2); jejak term-missing membantu menutup cabang.
addopts = --cov=app/analyzers --cov-report=term-missing:skip-covered --cov-fail-under=80
